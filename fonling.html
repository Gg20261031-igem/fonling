<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>AI 聊天助手</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;font-size:16px;line-height:1.5;color:#333;background:#fff;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font-family:inherit;font-size:inherit;outline:none}
button{border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
textarea{resize:none}

/* ===== Variables ===== */
:root{
  --primary:#07c160;
  --primary-dark:#06ad56;
  --bg-chat:#0d0d0d;
  --bubble-user:#1a6d37;
  --bubble-ai:#1a1a1a;
  --text:#e0e0e0;
  --text-secondary:#999;
  --topbar-bg:#111;
  --inputbar-bg:#111;
  --overlay-bg:rgba(0,0,0,0.7);
  --shadow-sm:0 1px 3px rgba(0,0,0,.25);
  --shadow-md:0 2px 12px rgba(0,0,0,.35);
  --radius:10px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --topbar-h:52px;
  --inputbar-h:56px;
}

/* ===== App Shell ===== */
#app{display:flex;flex-direction:column;height:100%;height:100vh;height:100dvh;background:var(--topbar-bg)}

/* ===== Top Bar ===== */
#topBar{position:relative;display:flex;align-items:center;justify-content:center;height:var(--topbar-h);padding:0 16px;padding-top:var(--safe-t);background:var(--topbar-bg);box-shadow:var(--shadow-sm);z-index:10;flex-shrink:0}
#topBar .ai-name{font-size:17px;font-weight:600;color:var(--text)}
#settingsBtn{position:absolute;right:12px;bottom:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:50%;color:#aaa;transition:background .2s}
#settingsBtn:active{background:rgba(255,255,255,.1)}

/* ===== Chat Area ===== */
#chatArea{flex:1;overflow-y:auto;padding:12px 14px;padding-bottom:8px;background:var(--bg-chat);background-size:cover;background-position:center;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
#chatArea::-webkit-scrollbar{width:3px}
#chatArea::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}

/* Welcome */
.welcome{text-align:center;color:var(--text-secondary);padding:60px 20px 40px;font-size:15px;line-height:1.8}
.welcome strong{display:block;font-size:18px;color:var(--text);margin-bottom:8px}
.welcome .hint{color:#777;font-size:14px;margin-top:12px}

/* ===== Message Bubbles ===== */
.msg-wrap{margin-bottom:14px;display:flex;flex-direction:column;animation:msgIn .25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.user{align-items:flex-end}
.msg-wrap.assistant{align-items:flex-start}
.msg-wrap.system{align-items:center}

.bubble{max-width:82%;padding:10px 14px;border-radius:var(--radius);word-break:break-word;white-space:pre-wrap;font-size:15px;line-height:1.6;position:relative}
.msg-wrap.user .bubble{background:var(--bubble-user);border-bottom-right-radius:4px;color:var(--text)}
.msg-wrap.assistant .bubble{background:var(--bubble-ai);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm);color:var(--text)}
.msg-wrap.system .bubble{background:rgba(255,255,255,.08);color:var(--text-secondary);font-size:13px;padding:6px 12px;border-radius:6px;max-width:90%;text-align:center}
.msg-wrap.system .bubble.error{background:#3d1f1f;color:#ff6b6b}
.msg-wrap.system .bubble.summary-note{background:#1a3a1a;color:#4caf50;font-size:13px}

.msg-time{font-size:11px;color:#b0b0b0;margin:2px 6px 0}
.msg-wrap.user .msg-time{text-align:right}

/* Streaming cursor */
.bubble.streaming::after{content:"|";;display:inline;animation:blink .8s step-end infinite;color:var(--text);margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== Input Bar ===== */
#inputBar{display:flex;align-items:flex-end;gap:8px;padding:6px 10px;padding-bottom:calc(6px + var(--safe-b));background:var(--inputbar-bg);border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
#messageInput{flex:1;min-height:40px;max-height:120px;padding:10px 14px;border:1px solid #444;border-radius:20px;background:#1a1a1a;color:#e0e0e0;font-size:16px;line-height:1.4;outline:none;transition:border-color .2s}
#messageInput:focus{border-color:var(--primary)}
#sendBtn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--primary);border-radius:50%;color:#fff;font-size:18px;flex-shrink:0;transition:transform .15s,opacity .2s;box-shadow:0 2px 6px rgba(7,193,96,.3)}
#sendBtn:active{transform:scale(.92)}
#sendBtn:disabled{opacity:.4;transform:none;box-shadow:none}

/* ===== Settings Overlay ===== */
#settingsOverlay{position:fixed;inset:0;z-index:1000;visibility:hidden;transition:visibility .3s}
#settingsOverlay.active{visibility:visible}
#settingsOverlay .overlay-bg{position:absolute;inset:0;background:var(--overlay-bg);opacity:0;transition:opacity .3s}
#settingsOverlay.active .overlay-bg{opacity:1}

#settingsPanel{position:absolute;top:0;right:0;bottom:0;width:88%;max-width:380px;background:#1a1a1a;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 20px rgba(0,0,0,.5)}
#settingsOverlay.active #settingsPanel{transform:translateX(0)}

.settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;padding-top:calc(16px + var(--safe-t));border-bottom:1px solid #333;flex-shrink:0}
.settings-header h2{font-size:18px;font-weight:600}
#closeSettingsBtn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:50%;color:#888}
#closeSettingsBtn:active{background:#f0f0f0}

.settings-body{flex:1;overflow-y:auto;padding:18px;padding-bottom:calc(30px + var(--safe-b));-webkit-overflow-scrolling:touch}
.settings-body .label{display:block;font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px;margin-top:18px}
.settings-body .label:first-child{margin-top:0}
.settings-body .desc{font-size:12px;color:#888;margin-bottom:8px}

.settings-body input[type="text"],
.settings-body input[type="password"],
.settings-body textarea{width:100%;padding:10px 12px;border:1px solid #444;border-radius:8px;background:#1a1a1a;font-size:15px;transition:border .2s,background .2s;color:#e0e0e0}
.settings-body input:focus,
.settings-body textarea:focus{border-color:var(--primary);background:#252525}
.settings-body textarea{min-height:80px;line-height:1.5}

.btn-block{display:block;width:100%;padding:11px 0;border-radius:8px;font-size:15px;font-weight:500;text-align:center;transition:background .2s,opacity .2s}
.btn-block:active{opacity:.75}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:transparent;border:1px solid #555;color:#ccc}
.btn-outline:active{background:rgba(255,255,255,.08)}
.btn-danger{background:#2a1a1a;border:1px solid #5a2020;color:#ff6b6b}
.btn-danger:active{background:rgba(255,255,255,.05)}
.btn-upload{background:#2a2a2a;color:var(--text)}
.btn-upload:active{background:#353535}

.settings-body hr{border:none;border-top:1px solid #333;margin:20px 0}
.settings-body .spacer{height:12px}
.history-entry{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.history-entry input{flex:1;min-width:0;padding:9px 12px;border:1px solid #444;border-radius:8px;background:#1a1a1a;font-size:15px;transition:border .2s;color:#e0e0e0}
.history-entry input:focus{border-color:var(--primary);background:#252525}
.history-del-btn{width:36px;height:36px;border-radius:50%;border:none;background:#2a2a2a;color:#ff6b6b;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.history-del-btn:active{background:#4a1a1a}

/* ===== Landscape tweaks ===== */
@media(max-width:480px){
  #settingsPanel{width:92%}
  .bubble{max-width:88%}
}
@media(min-width:768px){
  #app{max-width:480px;margin:0 auto;box-shadow:0 0 30px rgba(0,0,0,.3);border-left:1px solid #333;border-right:1px solid #333}
}
</style>
</head>
<body>

<div id="app">
  <header id="topBar">
    <span class="ai-name">AI 助手</span>
    <button id="settingsBtn" aria-label="设置">⚙️</button>
  </header>

  <main id="chatArea"></main>

  <footer id="inputBar">
    <textarea id="messageInput" rows="1" placeholder="输入消息…" enterkeyhint="send"></textarea>
    <button id="sendBtn" aria-label="发送">➤</button>
  </footer>
</div>

<div id="settingsOverlay">
  <div class="overlay-bg" id="settingsOverlayBg"></div>
  <div id="settingsPanel">
    <div class="settings-header">
      <h2>设置</h2>
      <button id="closeSettingsBtn" aria-label="关闭">✕</button>
    </div>
    <div class="settings-body">
      <span class="label">DeepSeek API Key</span>
      <span class="desc">填入你的 DeepSeek API 密钥，格式如 sk-xxxxxxxx</span>
      <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">

      <span class="label">AI 人设与世界观</span>
      <span class="desc">在这里写入你想让 AI 扮演的角色和世界设定，实时生效</span>
      <textarea id="systemPromptInput" rows="5" placeholder="例如：你是修仙界的师姐，说话带古风，语气温柔但偶尔毒舌…"></textarea>

      <span class="label">回复风格指令</span>
      <span class="desc">额外要求，如「用毒舌吐槽风格」「用温柔文艺风格」等</span>
     <input type="text" id="styleInput" placeholder="例：用毒舌吐槽风格">
      
      <span class="label">我是谁</span>
      <span class="desc">告诉 AI 你的身份信息，作为全局记忆</span>
      <textarea id="userIdentityInput" rows="3" placeholder="例如：我是李明，28岁，软件工程师，正在准备考研…"></textarea>

      <span class="label">历史事件（全局记忆，优先级最高）</span>
      <span class="desc">重要事件永久保留在上下文中，不会被对话压缩影响。每条独立存储。</span>
      <div id="historyEventsContainer"></div>
      <div class="spacer"></div>
      <button class="btn-block btn-outline" id="addEventBtn">+ 添加历史事件</button>

      <div class="spacer"></div>
      <span class="label">当下状态</span>
      <span class="desc">记录当前时间、职务、事件、危机等实时信息</span>
      <textarea id="currentStateInput" rows="3" placeholder="例如：现在是2026年7月，我正在准备重要的演讲…"></textarea>

      <span class="label">聊天背景</span>
      <span class="desc">从相册选择图片作为聊天背景，关闭页面后依然保留</span>
      <div class="spacer"></div>
      <button class="btn-block btn-upload" id="bgUploadBtn">📷 上传背景图</button>
      <input type="file" id="bgFileInput" accept="image/*" hidden>
      <div class="spacer"></div>
      <button class="btn-block btn-outline" id="bgResetBtn">重置默认背景</button>

      <hr>

      <span class="label">数据迁移</span>
      <span class="desc">导出所有配置为 JSON 文件，方便换机备份</span>
      <div class="spacer"></div>
      <button class="btn-block btn-primary" id="exportBtn">📤 导出所有配置</button>
      <div class="spacer"></div>
      <button class="btn-block btn-outline" id="importBtn">📥 导入配置</button>
      <input type="file" id="importFileInput" accept=".json" hidden>

      <hr>

      <button class="btn-block btn-danger" id="clearChatBtn">🗑 清空聊天记录</button>
    </div>
  </div>
</div>

<script>
/* ==============================================
   AI 聊天助手 — 完整应用脚本
   ============================================== */

const DEEPSEEK_API = 'https://api.deepseek.com/chat/completions';
const MODEL = 'deepseek-chat';
const MAX_MSG_BEFORE_SUMMARY = 30;
const RECENT_KEEP = 14;

const LS = {
  API_KEY: 'ai_chat_api_key',
  SYSTEM_PROMPT: 'ai_chat_system_prompt',
  STYLE: 'ai_chat_style',
  BG_IMAGE: 'ai_chat_bg_image',
  MESSAGES: 'ai_chat_messages',
 SUMMARY: 'ai_chat_summary',
  USER_IDENTITY: 'ai_chat_user_identity',
  HISTORY_EVENTS: 'ai_chat_history_events',
  CURRENT_STATE: 'ai_chat_current_state',
};

let state = {
   apiKey: '',
   systemPrompt: '',
   style: '',
   bgImage: '',
   messages: [],
   summary: '',
  userIdentity: '',
  historyEvents: [],
  currentState: '',
  isStreaming: false,
  summarising: false,
};
 
 const $ = id => document.getElementById(id);
 const chatArea = $('chatArea');
 const messageInput = $('messageInput');
 const sendBtn = $('sendBtn');
 const settingsOverlay = $('settingsOverlay');
 const apiKeyInput = $('apiKeyInput');
 const systemPromptInput = $('systemPromptInput');
 const styleInput = $('styleInput');
 const bgFileInput = $('bgFileInput');
 const importFileInput = $('importFileInput');
const userIdentityInput = $('userIdentityInput');
const currentStateInput = $('currentStateInput');
const historyEventsContainer = $('historyEventsContainer');
const addEventBtn = $('addEventBtn');

/* ---- Persistence ---- */
 function loadState() {
   try {
     state.apiKey = localStorage.getItem(LS.API_KEY) || '';
     state.systemPrompt = localStorage.getItem(LS.SYSTEM_PROMPT) || '';
     state.style = localStorage.getItem(LS.STYLE) || '';
     state.bgImage = localStorage.getItem(LS.BG_IMAGE) || '';
     state.summary = localStorage.getItem(LS.SUMMARY) || '';
    state.userIdentity = localStorage.getItem(LS.USER_IDENTITY) || '';
    state.historyEvents = JSON.parse(localStorage.getItem(LS.HISTORY_EVENTS) || '[]');
    state.currentState = localStorage.getItem(LS.CURRENT_STATE) || '';
    const raw = localStorage.getItem(LS.MESSAGES);
    state.messages = raw ? JSON.parse(raw) : [];
   } catch (e) {
     state.messages = [];
   }
 }
 function save(key, value) {
   try { localStorage.setItem(key, value) } catch (e) {}
 }
 function saveJson(key, value) {
   try { localStorage.setItem(key, JSON.stringify(value)) } catch (e) {}
 }
 function saveMessages() {
   saveJson(LS.MESSAGES, state.messages);
 }
 function persistSettings() {
   save(LS.API_KEY, state.apiKey);
   save(LS.SYSTEM_PROMPT, state.systemPrompt);
   save(LS.STYLE, state.style);
   save(LS.BG_IMAGE, state.bgImage);
   save(LS.SUMMARY, state.summary);
  save(LS.USER_IDENTITY, state.userIdentity);
  saveJson(LS.HISTORY_EVENTS, state.historyEvents);
  save(LS.CURRENT_STATE, state.currentState);
}

/* ---- Background ---- */
function applyBackground(url) {
  if (url) {
    chatArea.style.backgroundImage = 'url(' + JSON.stringify(url) + ')';
    chatArea.style.backgroundSize = 'cover';
    chatArea.style.backgroundPosition = 'center';
  } else {
    chatArea.style.backgroundImage = '';
    chatArea.style.backgroundColor = '#ededed';
  }
}

/* ---- Render Messages ---- */
function renderMessages(scrollToBottom_) {
  if (scrollToBottom_ === undefined) scrollToBottom_ = true;
  chatArea.innerHTML = '';
  if (state.messages.length === 0) {
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    chatArea.appendChild(welcome);
    return;
  }
  for (let i = 0; i < state.messages.length; i++) {
    const msg = state.messages[i];
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + msg.role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (msg._streaming) bubble.classList.add('streaming');
    bubble.textContent = msg.content || '';
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
  }
  if (scrollToBottom_) scrollToBottom();
}
function scrollToBottom() {
  requestAnimationFrame(function(){ chatArea.scrollTop = chatArea.scrollHeight; });
}
function getLastBubble() {
  const wraps = chatArea.querySelectorAll('.msg-wrap.assistant');
  if (wraps.length === 0) return null;
  return wraps[wraps.length - 1].querySelector('.bubble');
}
function updateStreamingBubble() {
  const lastMsg = state.messages[state.messages.length - 1];
  if (!lastMsg || lastMsg.role !== 'assistant') return;
  const bubble = getLastBubble();
  if (bubble) { bubble.textContent = lastMsg.content; bubble.classList.add('streaming'); }
  scrollToBottom();
}
function finishStreamingBubble() {
  const lastMsg = state.messages[state.messages.length - 1];
  if (!lastMsg || lastMsg.role !== 'assistant') return;
  delete lastMsg._streaming;
  const bubble = getLastBubble();
  if (bubble) { bubble.textContent = lastMsg.content; bubble.classList.remove('streaming'); }
}

/* ---- Build API Messages ---- */
function buildApiMessages() {
  const result = [];
  if (state.systemPrompt) {
    result.push({ role: 'system', content: state.systemPrompt });
 }
  // 历史事件（优先级高于记忆压缩）
  for (let i = 0; i < state.historyEvents.length; i++) {
    const ev = (state.historyEvents[i] || '').trim();
    if (ev) {
      result.push({ role: 'system', content: '历史事件' + (i+1) + '：' + ev });
    }
  }
  // 当下状态
  if (state.currentState) {
    result.push({ role: 'system', content: '当前状态：' + state.currentState });
  }
  // 对话摘要（记忆压缩，优先级较低）
  if (state.summary) {
    result.push({ role: 'system', content: '以下是之前的对话摘要，请参考这些信息保持连续性：\n' + state.summary });
  }
  // 用户身份
  if (state.userIdentity) {
    result.push({ role: 'system', content: '用户身份信息：' + state.userIdentity });
  }
  // 最近对话
  const msgs = state.messages;
  const recent = msgs.slice(-RECENT_KEEP);
  for (let i = 0; i < recent.length; i++) {
    result.push({ role: recent[i].role, content: recent[i].content });
  }
  // 风格指令
  if (state.style) {
    result.push({ role: 'system', content: '回复时请遵循以下风格要求：' + state.style });
  }
  return result;
}

/* ---- Auto Summarize ---- */
async function autoSummarize() {
  if (state.summarising) return;
  if (state.messages.length <= MAX_MSG_BEFORE_SUMMARY) return;
  state.summarising = true;
  const total = state.messages.length;
  const toSummarize = state.messages.slice(0, total - RECENT_KEEP);
  if (toSummarize.length < 4) { state.summarising = false; return; }
  const summaryPrompt = [
    { role: 'system', content: '你是一个对话摘要助手。请用一段简洁的话总结以下对话的核心内容和关键信息，包括用户偏好、重要事实、已讨论的话题。保留所有有用信息，不要遗漏重要细节。只输出摘要内容，不要其他说明。' },
  ];
  for (let i = 0; i < toSummarize.length; i++) {
    summaryPrompt.push({ role: toSummarize[i].role, content: toSummarize[i].content });
  }
  const noteWrap = document.createElement('div');
  noteWrap.className = 'msg-wrap system';
  noteWrap.innerHTML = '<div class="bubble summary-note">🔄 对话较长，正在压缩历史记忆…</div>';
  chatArea.appendChild(noteWrap);
  scrollToBottom();
  try {
    const res = await fetch(DEEPSEEK_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + state.apiKey },
      body: JSON.stringify({ model: MODEL, messages: summaryPrompt, stream: false, max_tokens: 1024 }),
    });
    if (!res.ok) { noteWrap.remove(); state.summarising = false; return; }
    const data = await res.json();
    const summary = data.choices?.[0]?.message?.content?.trim();
    if (summary) {
      state.summary = summary;
      save(LS.SUMMARY, state.summary);
      state.messages = state.messages.slice(-RECENT_KEEP);
      saveMessages();
      noteWrap.querySelector('.bubble').textContent = '✅ 历史记忆已压缩，继续畅聊吧';
      var self = noteWrap;
      setTimeout(function(){ self.remove(); renderMessages(); }, 1500);
    } else {
      noteWrap.remove();
    }
  } catch (e) {
    noteWrap.remove();
  }
  state.summarising = false;
}

/* ---- Send Message ---- */
async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text || state.isStreaming) return;
  if (!state.apiKey) {
    addSystemMsg('请先点击右上角 ⚙️ 设置你的 DeepSeek API Key');
    return;
  }
  messageInput.value = '';
  messageInput.style.height = 'auto';
  sendBtn.disabled = true;
  state.isStreaming = true;
  state.messages.push({ role: 'user', content: text });
  saveMessages();
  renderMessages();
  const assistantMsg = { role: 'assistant', content: '', _streaming: true };
  state.messages.push(assistantMsg);
  renderMessages();
  const apiMessages = buildApiMessages();
  try {
    const response = await fetch(DEEPSEEK_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + state.apiKey },
      body: JSON.stringify({ model: MODEL, messages: apiMessages, stream: true, max_tokens: 4096 }),
    });
    if (!response.ok) {
      let errMsg = '请求失败 (' + response.status + ')';
      try { const errBody = await response.json(); errMsg = errBody.error?.message || errMsg; } catch(_) {}
      state.messages.pop();
      saveMessages();
      renderMessages();
      addSystemMsg('❌ ' + errMsg, true);
      state.isStreaming = false; sendBtn.disabled = false;
      return;
    }
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (let j = 0; j < lines.length; j++) {
        const trimmed = lines[j].trim();
        if (!trimmed || !trimmed.startsWith('data:')) continue;
        const data = trimmed.slice(5).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content || '';
          if (delta) { fullContent += delta; assistantMsg.content = fullContent; updateStreamingBubble(); }
        } catch(_) {}
      }
    }
    if (buffer.trim()) {
      const trimmed = buffer.trim();
      if (trimmed.startsWith('data:')) {
        const data = trimmed.slice(5).trim();
        if (data !== '[DONE]') {
          try {
            const parsed = JSON.parse(data);
            const delta = parsed.choices?.[0]?.delta?.content || '';
            if (delta) { fullContent += delta; assistantMsg.content = fullContent; updateStreamingBubble(); }
          } catch(_) {}
        }
      }
    }
    assistantMsg.content = fullContent;
    delete assistantMsg._streaming;
    finishStreamingBubble();
    saveMessages();
    if (state.messages.length > MAX_MSG_BEFORE_SUMMARY) { autoSummarize(); }
  } catch (e) {
    state.messages.pop();
    saveMessages();
    renderMessages();
    addSystemMsg('❌ 网络错误：' + (e.message || '请检查网络连接'), true);
  }
  state.isStreaming = false;
  sendBtn.disabled = false;
  messageInput.focus();
}

/* ---- Helpers ---- */
function addSystemMsg(text, isError) {
  if (isError === undefined) isError = false;
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap system';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isError ? ' error' : '');
  bubble.textContent = text;
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  scrollToBottom();
}

/* ---- Export / Import ---- */
function exportAllData() {
  const data = {
    export_version: 1,
    exported_at: new Date().toISOString(),
    settings: {
     apiKey: state.apiKey,
     systemPrompt: state.systemPrompt,
     style: state.style,
     bgImage: state.bgImage,
     summary: state.summary,
      historyEvents: state.historyEvents,
      currentState: state.currentState,
      userIdentity: state.userIdentity,
   },
   messages: state.messages,
 };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ai-chat-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.settings || !data.messages) { addSystemMsg('❌ 无效的配置文件格式', true); return; }
      const s = data.settings;
      state.apiKey = s.apiKey || '';
      state.systemPrompt = s.systemPrompt || '';
      state.style = s.style || '';
      state.bgImage = s.bgImage || '';
     state.summary = s.summary || '';
      state.historyEvents = Array.isArray(s.historyEvents) ? s.historyEvents : [];
      state.currentState = s.currentState || '';
      state.userIdentity = s.userIdentity || '';
     state.messages = Array.isArray(data.messages) ? data.messages : [];
      persistSettings();
      saveMessages();
      syncSettingsUI();
      applyBackground(state.bgImage);
      renderMessages();
      settingsOverlay.classList.remove('active');
      addSystemMsg('✅ 配置已成功导入');
    } catch (err) {
      addSystemMsg('❌ 导入失败：文件解析错误', true);
    }
  };
  reader.readAsText(file);
}

/* ---- Sync UI with state ---- */
function syncSettingsUI() {
  apiKeyInput.value = state.apiKey;
  systemPromptInput.value = state.systemPrompt;
  styleInput.value = state.style;
  userIdentityInput.value = state.userIdentity;
  currentStateInput.value = state.currentState;
  renderHistoryEvents();
}

/* ---- Render History Events ---- */
function renderHistoryEvents() {
  historyEventsContainer.innerHTML = '';
  for (let i = 0; i < state.historyEvents.length; i++) {
    const div = document.createElement('div');
    div.className = 'history-entry';
    const input = document.createElement('input');
    input.type = 'text';
    input.value = state.historyEvents[i] || '';
    input.placeholder = '重要事件 ' + (i+1);
    input.addEventListener('change', function(idx) {
      return function() { state.historyEvents[idx] = this.value; saveJson(LS.HISTORY_EVENTS, state.historyEvents); };
    }(i));
    const delBtn = document.createElement('button');
    delBtn.className = 'history-del-btn';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', function(idx) {
      return function() { state.historyEvents.splice(idx, 1); saveJson(LS.HISTORY_EVENTS, state.historyEvents); renderHistoryEvents(); };
    }(i));
    div.appendChild(input);
    div.appendChild(delBtn);
    historyEventsContainer.appendChild(div);
  }
}

/* ---- PWA Setup ---- */
function setupPWA() {
  function genIcon(size) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#07c160';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (size*0.45) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('AI', size/2, size/2 + 2);
    return c.toDataURL();
  }
  const manifest = {
    name: 'AI 聊天助手',
    short_name: 'AI聊天',
    description: '智能AI聊天助手',
    start_url: location.href,
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#ffffff',
    theme_color: '#07c160',
  };
  try {
    manifest.icons = [
      { src: genIcon(192), sizes: '192x192', type: 'image/png' },
      { src: genIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any' }
    ];
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch(e) {}
  const meta = document.createElement('meta');
  meta.name = 'theme-color';
  meta.content = '#07c160';
  document.head.appendChild(meta);
}

/* ---- Init ---- */
function init() {
  loadState();
  syncSettingsUI();
  applyBackground(state.bgImage);
  renderMessages();
  setupPWA();
}

/* ---- Event Listeners ---- */
sendBtn.addEventListener('click', sendMessage);
messageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
messageInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

$('settingsBtn').addEventListener('click', function() { settingsOverlay.classList.add('active'); });
$('closeSettingsBtn').addEventListener('click', function() { settingsOverlay.classList.remove('active'); });
$('settingsOverlayBg').addEventListener('click', function() { settingsOverlay.classList.remove('active'); });

apiKeyInput.addEventListener('change', function() { state.apiKey = this.value.trim(); save(LS.API_KEY, state.apiKey); });
systemPromptInput.addEventListener('change', function() { state.systemPrompt = this.value.trim(); save(LS.SYSTEM_PROMPT, state.systemPrompt); });
styleInput.addEventListener('change', function() { state.style = this.value.trim(); save(LS.STYLE, state.style); });
userIdentityInput.addEventListener('change', function() { state.userIdentity = this.value.trim(); save(LS.USER_IDENTITY, state.userIdentity); });

currentStateInput.addEventListener('change', function() { state.currentState = this.value.trim(); save(LS.CURRENT_STATE, state.currentState); });
addEventBtn.addEventListener('click', function() { state.historyEvents.push(''); saveJson(LS.HISTORY_EVENTS, state.historyEvents); renderHistoryEvents(); });
$('bgUploadBtn').addEventListener('click', function() { bgFileInput.click(); });
bgFileInput.addEventListener('change', function(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { addSystemMsg('❌ 请选择图片文件', true); return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    state.bgImage = ev.target.result;
    save(LS.BG_IMAGE, state.bgImage);
    applyBackground(state.bgImage);
  };
  reader.readAsDataURL(file);
  bgFileInput.value = '';
});
$('bgResetBtn').addEventListener('click', function() {
  state.bgImage = ''; save(LS.BG_IMAGE, ''); applyBackground('');
});

$('exportBtn').addEventListener('click', exportAllData);
$('importBtn').addEventListener('click', function() { importFileInput.click(); });
importFileInput.addEventListener('change', function(e) {
  const file = e.target.files?.[0];
  if (file) importData(file);
  importFileInput.value = '';
});

$('clearChatBtn').addEventListener('click', function() {
  if (state.messages.length === 0) return;
  if (!confirm('确定要清空所有聊天记录吗？此操作不可撤销。')) return;
  state.messages = [];
  state.summary = '';
  saveMessages();
  save(LS.SUMMARY, '');
  renderMessages();
});

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
